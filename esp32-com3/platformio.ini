[platformio]
default_envs = esp32dev
build_dir = D:/GateControllerBuild/platformio

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps = bblanchon/ArduinoJson@^7.2.0
upload_port = COM3
monitor_port = COM3
monitor_speed = 115200
upload_speed = 921600

[env:esp32dev_ota]
extends = env:esp32dev
upload_protocol = espota
upload_port = 192.168.0.228

[env:esp32dev_ap_ota]
extends = env:esp32dev
upload_protocol = espota
upload_port = 192.168.4.1
